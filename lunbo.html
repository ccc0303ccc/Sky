<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>輪播</title>
  <style>
    body { margin: 0; padding: 0; background: #000; }
    .carousel-container { width: calc(96% - 10px); margin: 0 auto; position: relative; overflow: hidden; border-radius: 10px; }
    .carousel { display: flex; transition: transform .5s ease-in-out; }
    .carousel-item { flex: 0 0 100%; position: relative; cursor: pointer; }
    .carousel img { width: 100%; height: 45vw; object-fit: cover; border-radius: 10px; transition: transform 0.4s ease; }
    .carousel-buttons { position: absolute; top: 50%; transform: translateY(-50%); width: 100%; display: flex; justify-content: space-between; z-index: 2; }
    .carousel-button { background: rgba(0,0,0,0.3); color: #fff; border: none; padding: 10px; border-radius: 50%; }
    .carousel-indicators { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); display: flex; z-index: 2; }
    .carousel-indicator { width: 10px; height: 4px; background: #808080; margin: 0 3px; cursor: pointer; }
    .carousel-indicator.active { background: #6a5acd; }
    .carousel-title { position: absolute; top: 10px; left: 10px; color: #fff; background: rgba(0,0,0,0.3); padding: 4px 10px; border-radius: 20px; font-size: 16px; z-index: 2; }
  </style>
</head>
<body>
<div class="carousel-container">
  <div class="carousel" id="carousel"></div>
  <div class="carousel-buttons">
    <button class="carousel-button" id="prevBtn">〈</button>
    <button class="carousel-button" id="nextBtn">〉</button>
  </div>
  <div class="carousel-indicators" id="carouselIndicators"></div>
  <div class="carousel-title" id="carouselTitle">標題</div>
</div>
<script>
(function(){
  const images = window.carouselData || [];
  const carousel = document.getElementById("carousel");
  const indicators = document.getElementById("carouselIndicators");
  const titleEl = document.getElementById("carouselTitle");
  let currentIndex = 0, interval;

  function update() {
    carousel.style.transform = "translateX(-" + (currentIndex * 100) + "%)";
    titleEl.textContent = images[currentIndex]?.title || "";
    indicators.querySelectorAll(".carousel-indicator").forEach((el, i) => {
      el.classList.toggle("active", i === currentIndex);
    });
  }

  function start() {
    interval = setInterval(() => {
      currentIndex = (currentIndex + 1) % images.length;
      update();
    }, 3000);
  }

  function reset() {
    clearInterval(interval);
    start();
  }

  images.forEach((img, i) => {
    const div = document.createElement("div");
    div.className = "carousel-item";
    const imageEl = document.createElement("img");
    imageEl.src = decodeURIComponent(img.img);
    imageEl.alt = img.title;

    div.addEventListener("click", () => {
      const erUrl = "hiker://page/er?rule=Movieffm🍥&url=" + encodeURIComponent(img.url) + "#immersiveTheme##autoCache##noHistory#";
      fba.open(JSON.stringify({
        rule: "er",
        title: img.title,
        url: erUrl,
        extra: { img: img.img }
      }));
    });

    div.appendChild(imageEl);
    carousel.appendChild(div);

    const ind = document.createElement("div");
    ind.className = "carousel-indicator";
    ind.addEventListener("click", () => { currentIndex = i; update(); reset(); });
    indicators.appendChild(ind);
  });

  document.getElementById("prevBtn").onclick = () => { currentIndex = (currentIndex - 1 + images.length) % images.length; update(); reset(); };
  document.getElementById("nextBtn").onclick = () => { currentIndex = (currentIndex + 1) % images.length; update(); reset(); };

  update();
  start();
})();
</script>
</body>
</html>
